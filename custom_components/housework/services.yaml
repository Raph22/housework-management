add_task:
  fields:
    title:
      required: true
      example: "Clean bathroom"
      selector:
        text:
    frequency_type:
      required: true
      selector:
        select:
          translation_key: "frequency_type"
          options:
            - "daily"
            - "weekly"
            - "monthly"
            - "day_of_week"
            - "once"
    frequency_value:
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 365
          mode: box
    frequency_days_of_week:
      required: false
      selector:
        select:
          multiple: true
          translation_key: "day_of_week"
          options:
            - "0"
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
    frequency_day_of_month:
      required: false
      selector:
        number:
          min: 1
          max: 31
          mode: box
    scheduling_mode:
      required: false
      default: "rolling"
      selector:
        select:
          translation_key: "scheduling_mode"
          options:
            - "rolling"
            - "fixed"
    priority:
      required: false
      default: 3
      selector:
        select:
          translation_key: "priority"
          options:
            - "1"
            - "2"
            - "3"
            - "4"
    description:
      required: false
      selector:
        text:
          multiline: true
    assignees:
      required: false
      selector:
        entity:
          domain: person
          multiple: true
    assignment_strategy:
      required: false
      default: "round_robin"
      selector:
        select:
          translation_key: "assignment_strategy"
          options:
            - "round_robin"
            - "least_completed"
            - "random"
            - "fixed"
    icon:
      required: false
      selector:
        icon:
    labels:
      required: false
      selector:
        text:
          multiple: true
    next_due:
      required: false
      selector:
        date:

